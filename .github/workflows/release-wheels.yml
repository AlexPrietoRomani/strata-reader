name: release-wheels

# Triggered manually (workflow_dispatch) or by pushing a v* tag.
# Builds the strata-reader wheel for the supported platforms and
# uploads the artifacts. Publishing to PyPI is a follow-up workflow.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
            python-target: x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_28
            python-target: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-target: x64
          - os: macos-14
            target: aarch64-apple-darwin
            python-target: universal2
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.python-target }}
          manylinux: ${{ matrix.manylinux }}
          # `--release` for optimization, `--out dist` so the artifact
          # uploader can find every .whl in one folder.
          args: --release --out dist --strip
          # Force-include the `strata_ia` Python package alongside
          # `strata_reader` so the gRPC microservice can be spawned by
          # EmbeddedWorker without an extra pip install.
          working-directory: ${{ github.workspace }}

      - name: Smoke-test the wheel
        if: matrix.os != 'ubuntu-latest' || matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -e
          python -m venv /tmp/wheel-test
          /tmp/wheel-test/bin/pip install dist/*.whl || \
            /tmp/wheel-test/Scripts/pip install dist/*.whl
          /tmp/wheel-test/bin/python -c \
            "from strata_reader import version, parse, parse_batch, ParseOptions; print('strata-reader', version())" || \
            /tmp/wheel-test/Scripts/python.exe -c \
              "from strata_reader import version, parse, parse_batch, ParseOptions; print('strata-reader', version())"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  consolidate:
    name: consolidate artifacts
    needs: [build, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-all
      - name: List
        run: ls -la dist-all/**/* || true
      - name: Upload consolidated
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: dist-all/**/*
