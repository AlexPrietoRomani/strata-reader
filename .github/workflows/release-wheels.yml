name: release-wheels

# Triggered manually (workflow_dispatch) or by pushing a v* tag.
# Builds the strata-reader wheel for the supported platforms and
# uploads the artifacts. Publishing to PyPI is a follow-up workflow.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
            python-target: x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_28
            python-target: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-target: x64
          - os: macos-14
            target: aarch64-apple-darwin
            python-target: universal2
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Resolve PDFium Platform Name
        id: pdfium_platform
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          if [ "$TARGET" = "x86_64-unknown-linux-gnu" ]; then
            echo "name=linux-x64" >> $GITHUB_OUTPUT
          elif [ "$TARGET" = "aarch64-unknown-linux-gnu" ]; then
            echo "name=linux-arm64" >> $GITHUB_OUTPUT
          elif [ "$TARGET" = "x86_64-pc-windows-msvc" ]; then
            echo "name=win-x64" >> $GITHUB_OUTPUT
          elif [ "$TARGET" = "aarch64-apple-darwin" ]; then
            echo "name=mac-arm64" >> $GITHUB_OUTPUT
          else
            echo "Unsupported target: $TARGET"
            exit 1
          fi

      - name: Download and Verify PDFium
        shell: bash
        run: |
          set -e
          PLATFORM="${{ steps.pdfium_platform.outputs.name }}"
          VERSION="7843"
          URL="https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${VERSION}/pdfium-${PLATFORM}.tgz"
          
          echo "Downloading PDFium for ${PLATFORM} from ${URL}..."
          curl -L -o "pdfium-${PLATFORM}.tgz" "$URL"
          
          # Checksum verification
          echo "Verifying SHA-256 checksum..."
          if command -v sha256sum &> /dev/null; then
            grep "pdfium-${PLATFORM}.tgz" scripts/pdfium-checksums.sha256 | sha256sum -c -
          else
            grep "pdfium-${PLATFORM}.tgz" scripts/pdfium-checksums.sha256 | shasum -a 256 -c -
          fi
          
          # Extract into strata_reader package structure
          TARGET_DIR="python/strata_reader/_pdfium"
          mkdir -p "$TARGET_DIR"
          tar -xzf "pdfium-${PLATFORM}.tgz" -C "$TARGET_DIR"
          
          echo "PDFium extracted successfully to ${TARGET_DIR}:"
          ls -la "$TARGET_DIR"

      - name: Install Delvewheel (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: pip install delvewheel

      - name: Install Delocate (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        run: pip install delocate

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.python-target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --strip ${{ (matrix.os == 'ubuntu-latest') && '--auditwheel repair' || '' }}
          # Force-include the `strata_ia` Python package alongside
          # `strata_reader` so the gRPC microservice can be spawned by
          # EmbeddedWorker without an extra pip install.
          working-directory: ${{ github.workspace }}
          before-script-linux: |
            PROTOC_VERSION="29.3"
            ARCH=$(uname -m)
            if [ "$ARCH" = "x86_64" ]; then
              PROTOC_ARCH="linux-x86_64"
            elif [ "$ARCH" = "aarch64" ]; then
              PROTOC_ARCH="linux-aarch_64"
            else
              PROTOC_ARCH="linux-x86_64"
            fi
            python -c "import urllib.request, ssl; ctx = ssl._create_unverified_context(); r = urllib.request.urlopen('https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip', context=ctx); f = open('protoc.zip', 'wb'); f.write(r.read()); f.close(); r.close()"
            python -c "import zipfile; zipfile.ZipFile('protoc.zip').extract('bin/protoc', '/usr/local')"
            chmod +x /usr/local/bin/protoc
            rm -f protoc.zip
            protoc --version

      - name: Repair Wheel (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -e
          echo "Repairing Windows Wheel with delvewheel..."
          # delvewheel bundles DLLs not found in system directories
          # We need to make sure pdfium.dll is properly bundled if it's in the bin/ folder of our package.
          # delvewheel requires an explicit --add-path pointing to the folder containing the DLL.
          delvewheel repair dist/*.whl --add-path python/strata_reader/_pdfium/bin/ -w dist-repaired/
          mv dist-repaired/*.whl dist/

      - name: Repair Wheel (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -e
          echo "Repairing macOS Wheel with delocate..."
          delocate-wheel -v dist/*.whl

      - name: Verify Wheel Contents
        shell: bash
        run: |
          set -e
          echo "Checking wheel contents to ensure PDFium is present..."
          python -m zipfile -l dist/*.whl | grep -i pdfium

      - name: Smoke-test the wheel
        if: matrix.os != 'ubuntu-latest' || matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -e
          python -m venv /tmp/wheel-test
          /tmp/wheel-test/bin/pip install dist/*.whl || \
            /tmp/wheel-test/Scripts/pip install dist/*.whl
          /tmp/wheel-test/bin/python -c \
            "from strata_reader import version, parse, parse_batch, ParseOptions; print('strata-reader', version())" || \
            /tmp/wheel-test/Scripts/python.exe -c \
              "from strata_reader import version, parse, parse_batch, ParseOptions; print('strata-reader', version())"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  consolidate:
    name: consolidate artifacts
    needs: [build, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-all
      - name: List
        run: ls -la dist-all/**/* || true
      - name: Upload consolidated
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: dist-all/**/*
