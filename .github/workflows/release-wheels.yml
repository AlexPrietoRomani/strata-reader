name: release-wheels

# Triggered manually (workflow_dispatch) or by pushing a v* tag.
# Builds the strata-reader wheel (abi3 — one wheel per platform for
# Python 3.12+) and publishes to PyPI automatically on tag push.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ───────────────────────────────────────────────
          # maturin-action expects short target names for Linux so it
          # can map them to the correct manylinux Docker container.
          - os: ubuntu-latest
            target: x86_64
            manylinux: manylinux_2_28
            pdfium-platform: linux-x64
          # TODO: re-enable aarch64 Linux once Docker/QEMU cross-compile
          # issue is resolved (maturin-action + manylinux_2_28 + QEMU).
          # - os: ubuntu-latest
          #   target: aarch64
          #   manylinux: manylinux_2_28
          #   pdfium-platform: linux-arm64
          # ── Windows ────────────────────────────────────────────
          - os: windows-latest
            target: x64
            pdfium-platform: win-x64
          # ── macOS (Apple Silicon) ──────────────────────────────
          - os: macos-14
            target: aarch64-apple-darwin
            pdfium-platform: mac-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # QEMU is required for cross-compiling aarch64 Linux wheels
      # inside Docker on x86_64 GitHub-hosted runners.
      - name: Setup QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3

      # protoc is needed on the runner for non-Linux (Windows/macOS).
      # Linux builds install protoc inside the Docker container via
      # before-script-linux below.
      - name: Install protoc
        if: matrix.os != 'ubuntu-latest'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Download and Verify PDFium
        shell: bash
        run: |
          set -e
          PLATFORM="${{ matrix.pdfium-platform }}"
          VERSION="7843"
          URL="https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${VERSION}/pdfium-${PLATFORM}.tgz"

          echo "Downloading PDFium for ${PLATFORM} from ${URL}..."
          curl -L -o "pdfium-${PLATFORM}.tgz" "$URL"

          # Checksum verification
          echo "Verifying SHA-256 checksum..."
          if command -v sha256sum &> /dev/null; then
            grep "pdfium-${PLATFORM}.tgz" scripts/pdfium-checksums.sha256 | sha256sum -c -
          else
            grep "pdfium-${PLATFORM}.tgz" scripts/pdfium-checksums.sha256 | shasum -a 256 -c -
          fi

          # Extract into strata_reader package structure
          TARGET_DIR="python/strata_reader/_pdfium"
          mkdir -p "$TARGET_DIR"
          tar -xzf "pdfium-${PLATFORM}.tgz" -C "$TARGET_DIR"

          echo "PDFium extracted successfully to ${TARGET_DIR}:"
          ls -la "$TARGET_DIR"

      - name: Install Delvewheel (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: pip install delvewheel

      - name: Install Delocate (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        run: pip install delocate

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          # abi3: one wheel per platform for Python 3.12+
          args: --release --out dist --strip -i python3.12 ${{ matrix.manylinux && '--auditwheel repair' || '' }}
          working-directory: ${{ github.workspace }}
          before-script-linux: |
            # ── Install protoc inside the manylinux container ────
            PROTOC_VERSION="29.3"
            ARCH=$(uname -m)
            if [ "$ARCH" = "x86_64" ]; then
              PROTOC_ARCH="linux-x86_64"
            elif [ "$ARCH" = "aarch64" ]; then
              PROTOC_ARCH="linux-aarch_64"
            else
              PROTOC_ARCH="linux-x86_64"
            fi

            # manylinux_2_28 (AlmaLinux 8) does NOT include unzip.
            yum install -y unzip
            curl -Lo protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip"
            unzip -o protoc.zip bin/protoc -d /usr/local
            chmod +x /usr/local/bin/protoc
            rm -f protoc.zip
            protoc --version

      - name: Repair Wheel (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -e
          echo "Repairing Windows Wheel with delvewheel..."
          delvewheel repair dist/*.whl --add-path python/strata_reader/_pdfium/bin/ -w dist-repaired/
          mv dist-repaired/*.whl dist/

      - name: Repair Wheel (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -e
          echo "Repairing macOS Wheel with delocate..."
          delocate-wheel -v dist/*.whl

      - name: Verify Wheel Contents
        shell: bash
        run: |
          set -e
          echo "Checking wheel contents to ensure PDFium is present..."
          python -m zipfile -l dist/*.whl | grep -i pdfium

      # Smoke-test: skip aarch64 Linux (can't run ARM binaries on x86_64 runner)
      - name: Smoke-test the wheel
        if: matrix.target != 'aarch64'
        shell: bash
        run: |
          set -e
          python -m venv test-venv
          if [ -f test-venv/bin/pip ]; then
            test-venv/bin/pip install dist/*.whl
            test-venv/bin/python -c "from strata_reader import version; print('strata-reader', version())"
          else
            test-venv/Scripts/pip install dist/*.whl
            test-venv/Scripts/python.exe -c "from strata_reader import version; print('strata-reader', version())"
          fi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI (only on tag push) ─────────────────────────
  publish:
    name: publish to PyPI
    needs: [build, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC Trusted Publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v6
        with:
          pattern: "wheels-*"
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v6
        with:
          name: sdist
          path: dist

      - name: List packages to publish
        run: |
          echo "📦 Packages ready for PyPI:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
