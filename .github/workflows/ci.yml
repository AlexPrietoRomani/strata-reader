name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --frozen --all-extras
        env:
          UV_LINK_MODE: copy

      - run: uv run ruff check .
      - run: uv run mypy python/

  test-rust:
    name: test-rust (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --no-fail-fast

  test-python:
    name: test-python
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --all-extras
        env:
          UV_LINK_MODE: copy
      - run: uv run maturin develop --release
      - run: uv run pytest -q tests/unit_py

  wheel-build:
    name: wheel (${{ matrix.target }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_28
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-14
            target: universal2-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
          before-script-linux: |
            PROTOC_VERSION="29.3"
            ARCH=$(uname -m)
            if [ "$ARCH" = "x86_64" ]; then
              PROTOC_ARCH="linux-x86_64"
            elif [ "$ARCH" = "aarch64" ]; then
              PROTOC_ARCH="linux-aarch_64"
            else
              PROTOC_ARCH="linux-x86_64"
            fi
            
            # Find python3 or python dynamically
            if command -v python3 &>/dev/null; then
              PYTHON_BIN="python3"
            elif command -v python &>/dev/null; then
              PYTHON_BIN="python"
            else
              echo "Error: Python not found!"
              exit 1
            fi
            
            echo "Using Python binary: $PYTHON_BIN"
            $PYTHON_BIN -c "import urllib.request, ssl; ctx = ssl._create_unverified_context(); r = urllib.request.urlopen('https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip', context=ctx); f = open('protoc.zip', 'wb'); f.write(r.read()); f.close(); r.close()"
            $PYTHON_BIN -c "import zipfile; zipfile.ZipFile('protoc.zip').extract('bin/protoc', '/usr/local')"
            chmod +x /usr/local/bin/protoc
            rm -f protoc.zip
            protoc --version
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
