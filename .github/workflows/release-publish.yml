name: release-publish

# Triggered by `git push origin v*`. Builds wheels + sdist via the
# release-wheels workflow first, then promotes the artifacts to PyPI
# and creates a GitHub Release with the CHANGELOG body.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  id-token: write   # for PyPI's OpenID Connect publishing.

jobs:
  build:
    uses: ./.github/workflows/release-wheels.yml

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist
      - name: Flatten artifact tree
        run: |
          set -e
          mkdir -p dist-flat
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist-flat/ \;
          ls -la dist-flat
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-flat
          skip-existing: true

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist
      - name: Extract changelog section
        run: |
          python3 - <<'PY'
          import re, sys, os
          tag = os.environ.get("GITHUB_REF_NAME", "v0.0.0")
          version = tag.lstrip("v")
          text = open("CHANGELOG.md", encoding="utf-8").read()
          # Grab from `## [<version>]` up to the next `## [` heading.
          pattern = re.compile(rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)', re.DOTALL)
          m = pattern.search(text)
          body = m.group(1).strip() if m else "(no changelog entry — falling back to commit log)"
          open("release_body.md", "w", encoding="utf-8").write(body)
          PY
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: dist/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
